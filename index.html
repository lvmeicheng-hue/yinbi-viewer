<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大胖当家导航图</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #1a1a2e;
            overflow: hidden;
        }
        #panorama { width: 100vw; height: 100vh; }

        /* ===== Title bar ===== */
        .title-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            z-index: 1001;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        /* ===== Legend ===== */
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1001;
            backdrop-filter: blur(10px);
        }
        .legend-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ffd700;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-icon {
            width: 20px; height: 20px;
            margin-right: 10px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .legend-icon.destination {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
        }
        .legend-icon.restaurant {
            border: 3px solid #ffd700;
            background: transparent;
        }
        @media (max-width: 768px) {
            .legend { bottom: 10px; left: 10px; padding: 10px 15px; }
            .legend-title { font-size: 14px; }
            .legend-item { font-size: 12px; }
            .title-bar { font-size: 14px; padding: 8px 20px; }
        }

        /* ===== Drag hint ===== */
        .drag-hint {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px 28px;
            color: #fff;
            font-size: 14px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease;
        }
        .drag-hint.hidden { opacity: 0; }
        .drag-hint svg {
            width: 24px; height: 24px;
            vertical-align: middle;
            margin-right: 8px;
            fill: #fff;
        }

        /* ===== Hide pannellum defaults ===== */
        .pnlm-controls-container { display: none !important; }
        .pnlm-hotspot .pnlm-sprite { display: none !important; }
        .pnlm-hotspot { background: none !important; width: auto !important; height: auto !important; }

        /* ===== Hotspot: destination marker (大胖当家) ===== */
        .hotspot-destination .dest-marker {
            display: flex;
            align-items: center;
            gap: 8px;
            transform: scale(1.5);
            transform-origin: center center;
        }
        .hotspot-destination .marker-pin {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            flex-shrink: 0;
        }
        .hotspot-destination .marker-pin::after {
            content: "📍";
            transform: rotate(45deg);
            font-size: 24px;
        }
        .hotspot-destination .marker-label {
            color: #fff;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 900;
            white-space: nowrap;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.4);
        }

        /* ===== Hotspot: restaurant frame (入口画框) ===== */
        .hotspot-restaurant {
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .hotspot-restaurant .rest-frame {
            width: 120px;
            height: 90px;
            border: 4px solid #ffd700;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), inset 0 0 20px rgba(255, 215, 0, 0.2);
            animation: pulse-border 2s ease-in-out infinite;
            position: relative;
        }
        .hotspot-restaurant .rest-label {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #333;
            padding: 5px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.5);
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), inset 0 0 20px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.8), inset 0 0 30px rgba(255, 215, 0, 0.3); }
        }

        /* ===== Hotspot: arrow guide text ===== */
        .hotspot-arrow .arrow-text {
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
        }

        /* ===== Red dashed path line ===== */
        .path-line-svg {
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .path-line-svg svg {
            overflow: visible;
        }
        .dashed-path {
            animation: dash-flow 2s linear infinite;
        }
        @keyframes dash-flow {
            to { stroke-dashoffset: -24; }
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="title-bar">🏠 大胖当家 · 导航指引</div>

    <!-- 图例 -->
    <div class="legend">
        <div class="legend-title">图例说明</div>
        <div class="legend-item">
            <div class="legend-icon destination"></div>
            <span>目的地：大胖当家</span>
        </div>
        <div class="legend-item">
            <div class="legend-icon restaurant"></div>
            <span>入口：大胖当家</span>
        </div>
        <div class="legend-item" style="margin-top:8px;padding-top:8px;border-top:1px dashed #ddd;">
            <span style="font-size:12px;color:#888;">红色虚线：从目的地到入口</span>
        </div>
    </div>

    <!-- 拖拽提示 -->
    <div class="drag-hint" id="dragHint">
        <svg viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
        拖拽画面查看全景
    </div>

    <!-- 全景容器 -->
    <div id="panorama"></div>

    <script>
        var viewer = pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: 'panorama.jpg',
            autoLoad: true,
            compass: false,
            showZoomCtrl: false,
            showFullscreenCtrl: false,
            mouseZoom: true,
            keyboardZoom: false,
            friction: 0.15,
            minHfov: 40,
            maxHfov: 120,
            hfov: 100,
            minPitch: -50,
            maxPitch: 80,
            yaw: 0,
            pitch: 0,
            hotSpots: [
                {
                    // 目的地标志 - 向左移动10度 (yaw 10→0)
                    pitch: 25,
                    yaw: 0,
                    type: 'info',
                    createTooltipFunc: createDestMarker,
                    createTooltipArgs: {}
                },
                {
                    // 入口画框 - 向右再移8度 (yaw 40→48)
                    pitch: 5,
                    yaw: 48,
                    type: 'info',
                    createTooltipFunc: createRestFrame,
                    createTooltipArgs: {}
                },
                {
                    // 箭头指引文字 - 向右下移动一点点 (yaw 43→46, pitch 0→-5)
                    pitch: -5,
                    yaw: 46,
                    type: 'info',
                    createTooltipFunc: createArrowGuide,
                    createTooltipArgs: {}
                },
                {
                    // 红色虚线 - 向右再移8度 (yaw 20→28)
                    pitch: 15,
                    yaw: 28,
                    type: 'info',
                    createTooltipFunc: createPathLine,
                    createTooltipArgs: {}
                }
            ]
        });

        // 目的地标记
        function createDestMarker(hotSpotDiv, args) {
            hotSpotDiv.classList.add('hotspot-destination');
            hotSpotDiv.innerHTML =
                '<div class="dest-marker">' +
                    '<div class="marker-pin"></div>' +
                    '<div class="marker-label">大胖当家</div>' +
                '</div>';
        }

        // 入口画框
        function createRestFrame(hotSpotDiv, args) {
            hotSpotDiv.classList.add('hotspot-restaurant');
            hotSpotDiv.innerHTML =
                '<div class="rest-frame">' +
                    '<div class="rest-label">大胖当家入口</div>' +
                '</div>';
        }

        // 箭头指引
        function createArrowGuide(hotSpotDiv, args) {
            hotSpotDiv.classList.add('hotspot-arrow');
            hotSpotDiv.innerHTML =
                '<div class="arrow-text">前往大胖当家从此上楼 ↑</div>';
        }

        // 红色虚线路径
        function createPathLine(hotSpotDiv, args) {
            hotSpotDiv.classList.add('path-line-svg');
            hotSpotDiv.innerHTML =
                '<svg width="300" height="150" viewBox="0 0 300 150">' +
                    '<path d="M 20 80 Q 80 80 120 60 Q 160 40 200 50 Q 240 60 280 70" ' +
                          'stroke="#ff6b6b" stroke-width="4" stroke-dasharray="10,5" fill="none" ' +
                          'class="dashed-path" stroke-linecap="round"/>' +
                    '<polygon points="280,70 270,60 275,75" fill="#ff6b6b"/>' +
                '</svg>';
        }

        // 拖拽提示自动隐藏
        var hintShown = true;
        document.getElementById('panorama').addEventListener('mousedown', hideDragHint);
        document.getElementById('panorama').addEventListener('touchstart', hideDragHint);
        function hideDragHint() {
            if (hintShown) {
                document.getElementById('dragHint').classList.add('hidden');
                hintShown = false;
                setTimeout(function() {
                    document.getElementById('dragHint').style.display = 'none';
                }, 1000);
            }
        }
        setTimeout(function() { hideDragHint(); }, 3000);
    </script>
</body>
</html>
